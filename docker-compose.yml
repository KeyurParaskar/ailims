version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: ailims-db
    environment:
      POSTGRES_USER: ailims
      POSTGRES_PASSWORD: ailims_password
      POSTGRES_DB: ailims
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailims"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ailims-backend
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://ailims:ailims_password@db:5432/ailims
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:ro

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ailims-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
